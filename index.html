<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>App 50 Aniversario Scout</title>
    
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/tesseract.js@4/dist/tesseract.min.js"></script>
    
    <style>
        :root { --primary: #4a148c; --secondary: #ffd600; --bizum: #00aeb1; --text: #333; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f2f5; margin: 0; padding: 15px; color: var(--text); }
        .container { background: white; padding: 25px; border-radius: 20px; max-width: 500px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); box-sizing: border-box; }
        .logo-main { display: block; margin: 0 auto 10px; width: 90px; height: auto; }
        .step { display: none; }
        .step.active { display: block; }
        h1 { font-size: 1.4rem; text-align: center; color: var(--primary); border-bottom: 3px solid var(--secondary); padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.9rem; color: var(--primary); }
        input, select { width: 100%; padding: 14px; margin-top: 8px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .comensal-input { background: #f9f9f9; border-left: 5px solid var(--secondary); margin-bottom: 10px; }
        .comensal-input::placeholder { color: #999; font-style: italic; }
        button { width: 100%; padding: 16px; margin-top: 20px; border: none; border-radius: 12px; background: var(--primary); color: white; font-weight: bold; font-size: 1.1rem; cursor: pointer; }
        .info-pago { background: #e0f7fa; padding: 15px; border-radius: 15px; border: 2px dashed var(--bizum); text-align: center; margin-top: 20px; }
        .btn-copy { background: var(--bizum); padding: 8px; font-size: 0.8rem; width: auto; margin-top: 10px; display: inline-block; }
        #loading { display:none; text-align:center; padding: 20px; color: #e65100; font-weight: bold; }
        .admin-box { overflow-x: auto; margin-top: 20px; border-radius: 10px; background: #fff; }
        table { width: 100%; border-collapse: collapse; font-size: 0.75rem; }
        th, td { padding: 10px; border: 1px solid #eee; text-align: left; }
        th { background: var(--primary); color: white; }

        /* Diseño de la Entrada */
        .ticket-card { width: 500px; height: 500px; margin: 20px auto; background-image: url('entradas cena.jpg'); background-size: contain; background-repeat: no-repeat; position: relative; background-color: white; border-radius: 10px; -webkit-print-color-adjust: exact; print-color-adjust: exact; }
        .ticket-number { position: absolute; top: 38px; right: 42px; font-family: sans-serif; font-weight: bold; color: #8b1d1d; font-size: 1.2rem; }
        .ticket-mini-name { position: absolute; top: 62px; right: 42px; font-family: sans-serif; font-size: 0.65rem; color: #8b1d1d; text-align: right; width: 120px; text-transform: uppercase; font-weight: bold; }
        .ticket-name { position: absolute; bottom: 110px; width: 100%; text-align: center; font-family: 'Arial Black', sans-serif; font-size: 1.8rem; text-transform: uppercase; color: #2b0d0d; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.jpeg" class="logo-main" onerror="this.style.display='none'">
    <h1>Cena 50 Aniversario</h1>

    <div id="step1" class="step active">
        <label>Responsable de la Reserva:</label>
        <input type="text" id="respNombre" placeholder="Ej: Juan Garcia">
        <label>Número de Entradas:</label>
        <select id="numEnt" onchange="generarCamposComensales()">
            <option value="1">1 Entrada (25€)</option>
            <option value="2">2 Entradas (50€)</option>
            <option value="3">3 Entradas (75€)</option>
            <option value="4">4 Entradas (100€)</option>
        </select>
        <div id="contenedorComensales"></div>
        <button onclick="irAPaso2()">Siguiente: Pago Bizum</button>
        <button onclick="accesoAdmin()" style="background:none; color:#bbb; font-size:0.7rem; text-decoration:underline; margin-top:10px;">Panel Admin</button>
    </div>

    <div id="step2" class="step">
        <div class="info-pago">
            <p>Total a pagar: <strong id="valTotal"></strong>€</p>
            <h2 style="color:var(--bizum); margin: 5px 0;">661 732 037</h2>
            <p style="font-size:0.8rem;">Concepto a poner: <br><b id="valConcepto" style="color:#d32f2f; font-size: 1rem;"></b></p>
            <button class="btn-copy" onclick="copiar()">COPIAR CONCEPTO</button>
        </div>
        <label>Sube el comprobante de Bizum:</label>
        <input type="file" id="fotoBizum" accept="image/*">
        <div id="loading">🕵️ Comprobando validez del Bizum...</div>
        <button id="btnValidar" onclick="analizarPago()">VALIDAR Y FINALIZAR</button>
        <button onclick="cambiar(1)" style="background:#888;">Volver</button>
    </div>

    <div id="step3" class="step" style="text-align:center;">
        <div style="border: 3px solid #2e7d32; padding: 25px; border-radius: 15px; background: #e8f5e9;">
            <h2 style="color:#2e7d32;">✅ Registro Completado</h2>
            <button onclick="imprimirEntradas()" style="background:#2e7d32;">IMPRIMIR MIS ENTRADAS</button>
            <button onclick="location.reload()" style="background:#555; margin-top:10px;">Nueva Reserva</button>
        </div>
    </div>

    <div id="stepAdmin" class="step">
        <h3>📋 Tesorería (Nube Google)</h3>
        <div class="admin-box"><table id="tAdmin"><thead><tr><th>Responsable</th><th>Pago</th><th>Comensales</th><th>Bizum</th></tr></thead><tbody id="bAdmin"></tbody></table></div>
        <h3>🎟️ Lista de Puerta</h3>
        <div class="admin-box"><table><thead><tr><th>Nº</th><th>Comensal</th><th>Responsable</th></tr></thead><tbody id="bPuerta"></tbody></table></div>
        <button onclick="cambiar(1)" style="background:#333;">Cerrar</button>
    </div>
</div>

<script>
    // --- CONFIGURACIÓN FIREBASE (TUS CLAVES) ---
    const firebaseConfig = {
        apiKey: "AIzaSyDPxmeX-6IQI3iQFRpNcCFdI8tBj0eCV6Q",
        authDomain: "cenascoutsanjose.firebaseapp.com",
        projectId: "cenascoutsanjose",
        storageBucket: "cenascoutsanjose.firebasestorage.app",
        messagingSenderId: "60451922845",
        appId: "1:60451922845:web:a06c4b9f62dcad4d1b8574"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    let globalFoto = "";
    let htmlFinalEntradas = "";

    function generarCamposComensales() {
        const n = document.getElementById('numEnt').value;
        const cont = document.getElementById('contenedorComensales');
        cont.innerHTML = '<label>Nombres de los asistentes:</label>';
        for(let i=1; i<=n; i++) {
            cont.innerHTML += `<input type="text" class="comensal-input" id="com_${i}" placeholder="Ej: Juan Garcia">`;
        }
    }
    window.onload = generarCamposComensales;

    function cambiar(p) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById('step' + (p === 'Admin' ? 'Admin' : p)).classList.add('active');
    }

    function irAPaso2() {
        const resp = document.getElementById('respNombre').value.trim();
        const n = document.getElementById('numEnt').value;
        if(!resp) return alert("Falta nombre responsable.");
        for(let i=1; i<=n; i++) if(!document.getElementById('com_'+i).value.trim()) return alert("Falta asistente " + i);
        document.getElementById('valTotal').innerText = n * 25;
        document.getElementById('valConcepto').innerText = `CenaAniversario ${n}Pax ${resp.toUpperCase()}`;
        cambiar(2);
    }

    function copiar() {
        navigator.clipboard.writeText(document.getElementById('valConcepto').innerText);
        alert("Copiado.");
    }

    document.getElementById('fotoBizum').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function() { globalFoto = reader.result; };
        if(e.target.files[0]) reader.readAsDataURL(e.target.files[0]);
    });

    async function analizarPago() {
        const fileInput = document.getElementById('fotoBizum');
        if(!fileInput.files[0]) return alert("Sube el comprobante.");
        const btn = document.getElementById('btnValidar');
        const load = document.getElementById('loading');
        btn.disabled = true; load.style.display = 'block';

        try {
            const { data: { text } } = await Tesseract.recognize(fileInput.files[0], 'spa');
            const ocr = text.toLowerCase();
            const importe = document.getElementById('valTotal').innerText;

            if ((ocr.includes("bizum") || ocr.includes("operación") || ocr.includes("enviado")) && ocr.includes(importe)) {
                guardarEnGoogle();
            } else {
                alert("No es legible la comprobación del Bizum, ponte en contacto con nosotros.");
            }
        } catch (e) { alert("Error de lectura."); }
        finally { btn.disabled = false; load.style.display = 'none'; }
    }

    async function guardarEnGoogle() {
        const resp = document.getElementById('respNombre').value;
        const n = parseInt(document.getElementById('numEnt').value);
        const lista = [];
        for(let i=1; i<=n; i++) lista.push(document.getElementById('com_'+i).value);

        try {
            await db.collection("reservas").add({
                responsable: resp,
                asistentes: lista,
                foto: globalFoto,
                total: n*25,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });

            const snapshot = await db.collection("reservas").get();
            let contadorSerie = 0;
            snapshot.forEach(doc => { if(doc.data().responsable !== resp) contadorSerie += doc.data().asistentes.length; });

            htmlFinalEntradas = "";
            lista.forEach((nom, i) => {
                const numS = String(contadorSerie + i + 1).padStart(3, '0');
                htmlFinalEntradas += `<div class="ticket-card"><div class="ticket-number">Nº ${numS}</div><div class="ticket-mini-name">${nom}</div><div class="ticket-name">${nom}</div></div>`;
            });
            cambiar(3);
        } catch (e) { alert("Error en Google: " + e); }
    }

    function imprimirEntradas() {
        const v = window.open('', '_blank');
        v.document.write(`<html><head><style>
            body { background:#f4f4f4; display: flex; flex-direction: column; align-items: center; padding: 20px; }
            .ticket-card { width: 500px; height: 500px; margin: 20px auto; background-image: url('entradas cena.jpg'); background-size: contain; background-repeat: no-repeat; position: relative; background-color: white; border-radius: 10px; -webkit-print-color-adjust: exact; }
            .ticket-number { position: absolute; top: 38px; right: 42px; font-family: sans-serif; font-weight: bold; color: #8b1d1d; font-size: 1.2rem; }
            .ticket-mini-name { position: absolute; top: 62px; right: 42px; font-family: sans-serif; font-size: 0.65rem; color: #8b1d1d; text-align: right; width: 120px; text-transform: uppercase; font-weight: bold; }
            .ticket-name { position: absolute; bottom: 110px; width: 100%; text-align: center; font-family: 'Arial Black', sans-serif; font-size: 1.8rem; text-transform: uppercase; color: #2b0d0d; }
            @media print { .btn-print { display: none; } body { background: white; padding: 0; } }
        </style></head><body>
        <button class="btn-print" onclick="window.print()" style="padding:20px; background:#4a148c; color:white; font-weight:bold; width: 500px; border-radius: 10px; border:none; cursor:pointer; margin-bottom:20px;">IMPRIMIR / GUARDAR PDF</button>
        ${htmlFinalEntradas}</body></html>`);
        v.document.close();
    }

    async function accesoAdmin() {
        if(prompt("Clave:") === "SCOUT50") {
            const bAdmin = document.getElementById('bAdmin');
            const bPuerta = document.getElementById('bPuerta');
            bAdmin.innerHTML = "Cargando..."; 
            const snapshot = await db.collection("reservas").orderBy("timestamp").get();
            bAdmin.innerHTML = ""; bPuerta.innerHTML = "";
            let numS = 1;
            snapshot.forEach(doc => {
                const r = doc.data();
                bAdmin.innerHTML += `<tr><td><b>${r.responsable}</b></td><td>${r.total}€</td><td>${r.asistentes.map(a => `• ${a}`).join('<br>')}</td><td><button onclick="verFoto('${r.foto}')">Ver</button></td></tr>`;
                r.asistentes.forEach(a => {
                    bPuerta.innerHTML += `<tr><td>${String(numS).padStart(3, '0')}</td><td><b>${a.toUpperCase()}</b></td><td>${r.responsable}</td></tr>`;
                    numS++;
                });
            });
            cambiar('Admin');
        }
    }

    function verFoto(data) {
        const v = window.open('', '_blank');
        v.document.write(`<img src="${data}" style="width:100%">`);
    }
</script>
</body>
</html>
